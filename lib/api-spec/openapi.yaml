openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: German Flashcard App API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication (Clerk-backed)
  - name: flashcards
    description: German flashcard operations
  - name: progress
    description: User study progress
  - name: quiz
    description: Quiz sessions and results
  - name: leaderboard
    description: Community leaderboard
  - name: workspaces
    description: Per-user dashboards (German→X language pairs)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/sign-in:
    post:
      operationId: signIn
      tags: [auth]
      summary: Sign in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInInput"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Wrong credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/sign-up:
    post:
      operationId: signUp
      tags: [auth]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpInput"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid input or email taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /flashcards:
    get:
      operationId: listFlashcards
      tags: [flashcards]
      summary: List flashcards with optional level filter
      parameters:
        - name: level
          in: query
          required: false
          schema:
            type: string
            enum: [A1, A2, B1, B2, C1]
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of flashcards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashcardList"

  /flashcards/generate:
    post:
      operationId: generateFlashcards
      tags: [flashcards]
      summary: Generate new flashcards using AI for a specific level
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlashcardGenerateInput"
      responses:
        "200":
          description: All generated words already exist (all skipped)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashcardGenerateResult"
        "201":
          description: Generated flashcards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashcardGenerateResult"

  /flashcards/stats:
    get:
      operationId: getFlashcardStats
      tags: [flashcards]
      summary: Get study stats grouped by level
      responses:
        "200":
          description: Stats by level
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LevelStats"

  /flashcards/daily:
    get:
      operationId: getDailyFlashcards
      tags: [flashcards]
      summary: Get today's recommended flashcard set
      parameters:
        - name: level
          in: query
          required: false
          schema:
            type: string
            enum: [A1, A2, B1, B2, C1]
      responses:
        "200":
          description: Daily flashcard set
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Flashcard"

  /flashcards/{id}:
    get:
      operationId: getFlashcard
      tags: [flashcards]
      summary: Get a single flashcard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A flashcard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flashcard"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /flashcards/{id}/progress:
    patch:
      operationId: updateFlashcardProgress
      tags: [progress]
      summary: Mark a flashcard as known or unknown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressUpdate"
      responses:
        "200":
          description: Updated flashcard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Flashcard"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get top learners and the caller's own rank
      responses:
        "200":
          description: Leaderboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"

  /quiz/start:
    post:
      operationId: startQuiz
      tags: [quiz]
      summary: Start a quiz session and get questions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizStartInput"
      responses:
        "200":
          description: Quiz session with questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizStartResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /quiz/finish:
    post:
      operationId: finishQuiz
      tags: [quiz]
      summary: Submit quiz answers and save results
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizFinishInput"
      responses:
        "200":
          description: Quiz saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizFinishResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /me/quiz-history:
    get:
      operationId: getQuizHistory
      tags: [quiz]
      summary: Get the signed-in user's quiz history
      responses:
        "200":
          description: List of past quiz sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizHistoryRow"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /me/quiz-stats:
    get:
      operationId: getQuizStats
      tags: [quiz]
      summary: Get aggregate quiz statistics for the signed-in user
      responses:
        "200":
          description: Quiz aggregate stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /me/workspaces:
    get:
      operationId: listWorkspaces
      tags: [workspaces]
      summary: List the caller's workspaces (default + user-created)
      responses:
        "200":
          description: Workspace list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: createWorkspace
      tags: [workspaces]
      summary: Create a new workspace (max 2 per user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceCreateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Workspace limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /me/workspaces/{id}/switch:
    post:
      operationId: switchWorkspace
      tags: [workspaces]
      summary: Set the active workspace for the caller
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Switched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceSwitchResult"
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /me/workspaces/{id}:
    delete:
      operationId: deleteWorkspace
      tags: [workspaces]
      summary: Delete a user-created workspace
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: string
                required:
                  - deleted
        "400":
          description: Cannot delete the default workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Workspace not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SignInInput:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required:
        - email
        - password

    SignUpInput:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        sessionId:
          type: string
        token:
          type: string
      required:
        - sessionId
        - token

    Flashcard:
      type: object
      properties:
        id:
          type: integer
        word:
          type: string
          description: German word with article e.g. "der Hund"
        article:
          type: ["string", "null"]
          description: der / die / das / null for verbs/adjectives
        baseWord:
          type: string
          description: The word without article
        level:
          type: string
          enum: [A1, A2, B1, B2, C1]
        category:
          type: string
        englishTranslation:
          type: string
        arabicTranslation:
          type: string
        exampleSentenceDe:
          type: string
        exampleSentenceEn:
          type: string
        exampleSentenceAr:
          type: string
        imageUrl:
          type: ["string", "null"]
        known:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - word
        - article
        - baseWord
        - level
        - category
        - englishTranslation
        - arabicTranslation
        - exampleSentenceDe
        - exampleSentenceEn
        - exampleSentenceAr
        - imageUrl
        - known
        - createdAt

    FlashcardList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Flashcard"
        total:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
      required:
        - items
        - total
        - offset
        - limit

    FlashcardGenerateResult:
      type: object
      properties:
        cards:
          type: array
          items:
            $ref: "#/components/schemas/Flashcard"
        skipped:
          type: integer
          description: Number of words skipped because they already exist in the card set
        message:
          type: string
          description: Human-readable message when all words were skipped
      required:
        - cards
        - skipped

    FlashcardGenerateInput:
      type: object
      properties:
        level:
          type: string
          enum: [A1, A2, B1, B2, C1]
        category:
          type: string
        count:
          type: integer
          default: 10
      required:
        - level

    LevelStats:
      type: object
      properties:
        level:
          type: string
        total:
          type: integer
        known:
          type: integer
        unknown:
          type: integer
        percentage:
          type: integer
      required:
        - level
        - total
        - known
        - unknown
        - percentage

    ProgressUpdate:
      type: object
      properties:
        known:
          type: boolean
      required:
        - known

    LeaderboardRow:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: string
        displayName:
          type: string
        imageUrl:
          type: ["string", "null"]
        knownCards:
          type: integer
        correctAnswers:
          type: integer
        longestStreak:
          type: integer
        xp:
          type: integer
      required:
        - rank
        - userId
        - displayName
        - imageUrl
        - knownCards
        - correctAnswers
        - longestStreak
        - xp

    LeaderboardResponse:
      type: object
      properties:
        top:
          type: array
          items:
            $ref: "#/components/schemas/LeaderboardRow"
        me:
          oneOf:
            - $ref: "#/components/schemas/LeaderboardRow"
            - type: "null"
      required:
        - top
        - me

    QuizStartInput:
      type: object
      properties:
        mode:
          type: string
          enum: [de-to-en, en-to-de, article, typing]
          description: Omit for random mode
        level:
          type: string
          enum: [A1, A2, B1, B2, C1, mixed]
          description: Omit for all levels; mixed = placement test
        count:
          type: integer
          default: 10
          description: Number of questions (max 25)
        lang:
          type: string
          default: ar
          description: Secondary language code for translations
      required: []

    QuizQuestion:
      type: object
      properties:
        flashcardId:
          type: integer
        questionType:
          type: string
          enum: [de-to-en, en-to-de, article, typing]
        prompt:
          type: string
        hint:
          type: ["string", "null"]
        options:
          type: array
          items:
            type: string
          description: Multiple-choice options; absent for typing mode
        correctAnswer:
          type: string
        level:
          type: string
      required:
        - flashcardId
        - questionType
        - prompt
        - correctAnswer
        - level

    QuizStartResponse:
      type: object
      properties:
        sessionId:
          type: ["string", "null"]
          description: Null for anonymous users
        mode:
          type: string
        level:
          type: ["string", "null"]
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
      required:
        - sessionId
        - mode
        - level
        - questions

    QuizAnswerInput:
      type: object
      properties:
        flashcardId:
          type: integer
        questionType:
          type: string
        userAnswer:
          type: string
        correct:
          type: boolean
        prompt:
          type: string
        level:
          type: string
      required:
        - flashcardId
        - questionType
        - userAnswer
        - correct
        - prompt
        - level

    QuizFinishInput:
      type: object
      properties:
        sessionId:
          type: ["string", "null"]
        answers:
          type: array
          items:
            $ref: "#/components/schemas/QuizAnswerInput"
      required:
        - sessionId
        - answers

    QuizFinishResponse:
      type: object
      properties:
        saved:
          type: boolean
        total:
          type: integer
        correct:
          type: integer
      required:
        - saved
        - total

    QuizHistoryRow:
      type: object
      properties:
        id:
          type: string
        mode:
          type: string
        level:
          type: ["string", "null"]
        totalQuestions:
          type: integer
        correctAnswers:
          type: integer
        finishedAt:
          type: string
          format: date-time
      required:
        - id
        - mode
        - totalQuestions
        - correctAnswers

    QuizStats:
      type: object
      properties:
        totalSessions:
          type: integer
        totalCorrect:
          type: integer
        totalQuestions:
          type: integer
        accuracy:
          type: number
          description: Percentage 0-100
      required:
        - totalSessions
        - totalCorrect
        - totalQuestions
        - accuracy

    Workspace:
      type: object
      properties:
        id:
          type: string
          description: The string 'default' for the virtual default workspace, otherwise a UUID
        name:
          type: string
        secondaryLanguage:
          type: string
          description: ISO-ish code (AR, EN, ES, FR, IT, TR)
        isDefault:
          type: boolean
        isCurrent:
          type: boolean
      required:
        - id
        - name
        - secondaryLanguage
        - isDefault
        - isCurrent

    WorkspaceList:
      type: object
      properties:
        currentId:
          type: ["string", "null"]
          description: Null when the user is in the default workspace
        max:
          type: integer
          description: Max number of additional user-created workspaces (3 total dashboards)
        workspaces:
          type: array
          items:
            $ref: "#/components/schemas/Workspace"
      required:
        - currentId
        - max
        - workspaces

    WorkspaceCreateInput:
      type: object
      properties:
        secondaryLanguage:
          type: string
          enum: [EN, ES, FR, IT, TR]
        name:
          type: string
          description: Optional; defaults to language name
      required:
        - secondaryLanguage

    WorkspaceSwitchResult:
      type: object
      properties:
        currentId:
          type: ["string", "null"]
      required:
        - currentId

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
