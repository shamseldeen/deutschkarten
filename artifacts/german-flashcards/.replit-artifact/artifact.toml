kind = "web"
previewPath = "/"
title = "German Flashcard App"
version = "1.0.0"
id = "artifacts/german-flashcards"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20027

[services.development]
run = "pnpm --filter @workspace/german-flashcards run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/german-flashcards", "run", "build" ]
publicDir = "artifacts/german-flashcards/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20027"
BASE_PATH = "/"
