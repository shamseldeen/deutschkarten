kind = "mobile"
previewPath = "/mobile/"
title = "Shams DeutschKarten"
version = "1.0.0"
id = "artifacts/mobile"
# router = "expo-domain"  # disabled — Ba7r currently owns the dev domain. Re-enable (and disable Ba7r's) to flip.

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 8081

[services.development]
run = "pnpm --filter @workspace/mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mobile", "run", "serve" ]

[services.env]
PORT = "8081"
BASE_PATH = "/mobile/"
